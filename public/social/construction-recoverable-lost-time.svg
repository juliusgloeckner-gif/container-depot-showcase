<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
<title id="title">RECOVERABLE LOST TIME IS A LARGE FIELD TARGET</title><desc id="desc">FMI divides active-site time into 32% recoverable lost time and 68% primary plus secondary time. The listed delays are examples within the 32%, not additional shares.</desc>
<rect width="1200" height="1200" fill="#f4f1ea"/><rect width="1200" height="34" fill="#f26a18"/><rect y="1092" width="1200" height="108" fill="#081421"/>
<rect x="76" y="70" width="81" height="81" rx="6" fill="#f26a18"/><text x="116" y="122" text-anchor="middle" fill="white" font-family="Arial" font-size="24" font-weight="700">UCD</text>
<text x="185" y="122" fill="#081421" font-family="Arial" font-size="24" font-weight="700">UNITED CONTAINER DEPOT</text>
<text x="82" y="210" fill="#d85109" font-family="Arial" font-size="24" font-weight="700">FIELD WORKFLOW</text>
<text x="82" y="290" fill="#081421" font-family="Arial" font-size="62" font-weight="700"><tspan x="82" dy="0">RECOVERABLE LOST TIME IS A</tspan><tspan x="82" dy="72">LARGE FIELD TARGET</tspan></text>
<text x="82" y="520" fill="#d85109" font-family="Arial" font-size="76" font-weight="700">32% + 68% = 100%</text>
<rect x="82" y="570" width="1036" height="335" rx="22" fill="#e8edf0"/><circle cx="322" cy="752" r="125" fill="none" stroke="#8b9aa5" stroke-width="54"/><circle cx="322" cy="752" r="125" fill="none" stroke="#f26a18" stroke-width="54" pathLength="100" stroke-dasharray="32 68" transform="rotate(-90 322 752)"/><text x="322" y="775" text-anchor="middle" font-size="80" font-weight="700">32%</text><rect x="548" y="616" width="36" height="36" rx="7" fill="#f26a18"/><text x="606" y="642" font-size="22" font-weight="700">RECOVERABLE LOST TIME 32%</text><rect x="548" y="670" width="36" height="36" rx="7" fill="#8b9aa5"/><text x="606" y="696" font-size="22" font-weight="700">PRIMARY + SECONDARY TIME 68%</text><line x1="548" y1="735" x2="1055" y2="735" stroke="#b6c1c8" stroke-width="3"/><text x="548" y="772" fill="#d85109" font-size="22" font-weight="700">RECOVERABLE EXAMPLES</text><circle cx="559" cy="812" r="11" fill="none" stroke="#d85109" stroke-width="4"/><text x="588" y="820" font-size="20" font-weight="700">WAITING FOR RESOURCES</text><circle cx="559" cy="851" r="11" fill="none" stroke="#d85109" stroke-width="4"/><text x="588" y="859" font-size="20" font-weight="700">LOOKING FOR MATERIAL</text><circle cx="559" cy="890" r="11" fill="none" stroke="#d85109" stroke-width="4"/><text x="588" y="898" font-size="20" font-weight="700">REWORK / UNPLANNED DELAYS</text>
<text x="82" y="976" fill="#34495b" font-family="Arial" font-size="30"><tspan x="82" dy="0">FMI divides active-site time into 32% recoverable lost time and 68%</tspan><tspan x="82" dy="40">primary plus secondary time. The listed delays are examples within the</tspan><tspan x="82" dy="40">32%, not additional shares.</tspan></text>
<text x="82" y="1070" fill="#5b6b79" font-family="Arial" font-size="21">Source: FMI, Stopping Supply Chain Risks from Impacting the Field</text>
<text x="82" y="1155" fill="white" font-family="Arial" font-size="23" font-weight="700">UNITEDCONTAINERDEPOT.COM/CONSTRUCTION</text>
</svg>